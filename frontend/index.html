<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4x4 雙人對戰翻轉棋</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <div id="game-container">
        <h1>4x4 雙人對戰翻轉棋</h1>

        <!-- 資訊面板：固定高度，所有狀態集中在這裡 -->
        <div class="info-panel">
            <div class="info-row">
                <span class="info-label">階段</span>
                <span id="game-state-text" class="info-value">連線中...</span>
            </div>
            <div class="info-row">
                <span class="info-label">回合</span>
                <span id="player-turn" class="info-value">連線中...</span>
            </div>
            <div class="info-row">
                <span class="info-label">分數</span>
                <span id="score-board" class="info-value">先手 0 - 0 後手 (特: 0-0)</span>
            </div>
            <div class="info-row">
                <span class="info-label">選擇</span>
                <span id="current-face" class="info-value face-front">正面 (黃)</span>
                <span class="info-hint">W 正面 / S 反面</span>
            </div>
            <div class="info-row">
                <span class="info-label">模式</span>
                <select id="game-mode-select" onchange="changeGameMode()">
                    <option value="pvp">雙人對戰 (本機)</option>
                    <option value="pva">玩家 VS 電腦 (AI)</option>
                </select>
            </div>
        </div>

        <!-- 棋盤 -->
        <div id="board" class="board"></div>

        <!-- 按鈕 -->
        <div class="controls" id="main-controls">
            <button id="btn-undo">悔棋</button>
            <button id="btn-restart">重新開始</button>
        </div>
        <div class="controls" id="replay-controls" style="display:none;">
            <button id="btn-replay-prev">上一步</button>
            <button id="btn-replay-next">下一步</button>
            <button onclick="exitReplay()">結束復盤</button>
        </div>

        <!-- 勝利彈窗 -->
        <div id="winner-modal">
            <h2 id="winner-text">先手 獲勝!</h2>
            <p id="winner-reason">收走2個特殊棋</p>
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                <button onclick="document.getElementById('winner-modal').style.display='none'; socket.emit('restart');">再來一局</button>
                <button onclick="document.getElementById('winner-modal').style.display='none'; startReplay();">查看復盤</button>
            </div>
        </div>
    </div>
    <script src="src/main.js"></script>
</body>
</html>
